<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Online Radio - live</title>

  <meta
    name="viewport"
    content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
  />
  <meta name="description" content="Tune in to your favourite online radio stations" />
  <meta name="theme-color" content="#000000" />

  <link href="https://fonts.googleapis.com/css?family=Sora" rel="stylesheet" type="text/css" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Online Radio - live" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <link rel="icon" href="/assets/icons/favicon-x16.png" type="image/x-icon" />
  <link rel="manifest" href="/manifest.json" />

  <style>
    body,
    h1,
    p * {
      font-family: 'Sora', sans-serif;
    }

    body,
    p {
      font-size: 16px;
    }

    body {
      background-color: #404040;
      color: white;
      margin: 0;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: white #404040;
    }

    *::-webkit-scrollbar {
      width: 8px;
    }

    *::-webkit-scrollbar-track {
      background: rgba(64, 64, 64, 0.15);
    }

    *::-webkit-scrollbar-thumb {
      background-color: white;
      border-radius: 20px;
      border: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
  <script>
    navigator.serviceWorker.register('/sw.js');
  </script>
</body>

</html>
