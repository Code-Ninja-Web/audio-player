version: 2
updates:
    - package-ecosystem: 'npm'
      directories:
          - '/'
          - '/apps/expo'
          - '/apps/next'
          - '/packages/app'
          - '/packages/config'
          - '/packages/scripts'
      schedule:
          interval: 'monthly'
      ignore:
          - dependency-name: '*'
            update-types:
                - 'version-update:semver-major'

    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'monthly'
      ignore:
          - dependency-name: '*'
            update-types:
                - 'version-update:semver-major'
