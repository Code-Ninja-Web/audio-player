name: Pull Request Validation

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0
          run_install: false

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (Monorepo)
        run: pnpm typecheck

      - name: Lint (Monorepo)
        run: pnpm lint

      - name: Build (Monorepo)
        run: pnpm build

      - name: Expo Doctor
        run: |
          cd apps/expo
          pnpm dlx expo-doctor

      - name: Expo Prebuild Validation
        run: |
          cd apps/expo
          CI=1 pnpm exec expo prebuild --platform all --no-install
