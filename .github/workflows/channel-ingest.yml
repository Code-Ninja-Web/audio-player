name: Ingest Channel Data

# Required secret: FULL_ACCESS_RESTDB_API_KEY
# Optional vars (use defaults if unset): RESTDB_BASE_URL, RESTDB_COLLECTION,
#   INGEST_SOURCE_BASE_URL

on:
    schedule:
        - cron: '0 0/12 * * *'

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20.x]
                # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

        steps:
            - uses: actions/checkout@v6
            - name: create env file
              run: |
                  touch .env
                  echo "FULL_ACCESS_RESTDB_API_KEY=${{ secrets.FULL_ACCESS_RESTDB_API_KEY }}" >> .env
                  echo "RESTDB_BASE_URL=${{ vars.RESTDB_BASE_URL }}" >> .env
                  echo "RESTDB_COLLECTION=${{ vars.RESTDB_COLLECTION }}" >> .env
                  echo "INGEST_SOURCE_BASE_URL=${{ vars.INGEST_SOURCE_BASE_URL }}" >> .env
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
            - name: Enable Corepack and activate Yarn
              run: |
                  corepack enable
                  corepack prepare yarn@4.13.0 --activate
                  yarn --version
            - run: yarn install --immutable
            - run: yarn ingest
